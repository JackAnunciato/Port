version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm ci --legacy-peer-deps
    build:
      commands:
        - npm run build
        # Confirma que o index.html existe onde o Amplify espera
        - ls -la dist/port
        - test -f dist/port/index.html
  artifacts:
    # Angular 22 com outputPath.browser = "" → arquivos em dist/port/
    baseDirectory: dist/port
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .angular/cache/**/*
