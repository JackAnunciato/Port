version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Angular 22 exige Node ^22.22.3 || ^24.15.0 || >=26
        - nvm install 22.22.3
        - nvm use 22.22.3
        - node -v
        - npm ci --legacy-peer-deps
    build:
      commands:
        - npm run build
        - ls -la dist/port
        - test -f dist/port/index.html
  artifacts:
    baseDirectory: dist/port
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .angular/cache/**/*
