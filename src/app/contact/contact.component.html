<div class="contact page-shell">
  <div class="cyber-panel contact-panel">
    <h2 class="page-title glitch-text" data-text="Contato">Contato</h2>
    <form class="form-group">
      <label for="name">Nome</label>
      <input type="text" id="name" placeholder="Seu nome" />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Seu email" />

      <label for="message">Mensagem</label>
      <textarea id="message" rows="5" placeholder="Sua mensagem"></textarea>

      <button class="cyber-btn" type="submit">Enviar</button>
    </form>
  </div>
</div>
